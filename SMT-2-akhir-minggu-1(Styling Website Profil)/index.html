<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Profil - Mochammad Khahfi</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
body {
    background-color: #eef2f3; /* Mengubah warna background seluruh halaman */
    
    /* 2. FONT FAMILY */
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif; /* Mengatur jenis font agar lebih modern */
    
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* Mengatur kotak profil */
.profile-card {
    background-color: #ffffff; /* Background color untuk kartu profil */
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    width: 350px;
    
    /* 4. TEXT ALIGN */
    text-align: center; /* Membuat semua teks di dalam kartu rata tengah */
}

h1 {
    color: #2c3e50; /* Warna heading utama (Biru Gelap) */
    font-size: 24px; /* Font size heading utama */
    margin-bottom: 5px;
}

h2 {
    color: #127909; /* Warna heading sekunder/nama (Biru Cerah) */
    font-size: 22px; /* Font size heading sekunder */
    margin-top: 15px;
    margin-bottom: 20px;
}

.bio-info p {
    font-size: 15px; /* Font size untuk isi profil */
    color: #555555;
    margin: 8px 0;
}

.avatar {
    width: 70px;
    height: 70px;
    background-color: #3498db;
    color: white;
    font-size: 24px;
    font-weight: bold;
    line-height: 70px;
    border-radius: 50%;
    margin: 20px auto 0 auto;
}
</style>
<body>

    <div class="profile-card">
        <!-- Heading Utama -->
        <h1>Profil Profil Saya</h1>
        
        <!-- Heading Sekunder untuk Nama -->
        <h2>Mochammad Khahfi</h2>
        
        <div class="bio-info">
            <p><strong>Kelas:</strong> XII RPL</p>
            <p><strong>Keahlian:</strong> Web Development & UI Design</p>
            <p><strong>Status:</strong> Pelajar</p>
        </div>
    </div>

</body>
</html>
