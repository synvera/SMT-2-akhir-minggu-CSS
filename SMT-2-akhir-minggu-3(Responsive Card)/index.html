<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik 2 — Responsive Card</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #f4f4f9;
            padding: 2rem;
        }

        /* Kontainer Utama */
        .card-container {
            display: grid;
            /* Default di HP: 1 kolom */
            grid-template-columns: 1fr; 
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Desain Card */
        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            color: #666;
            line-height: 1.5;
        }

        /* Responsif untuk Desktop (Layar mulai dari 768px ke atas) */
        @media (min-width: 768px) {
            .card-container {
                /* Berubah menjadi 3 kolom sejajar dengan ukuran sama besar */
                grid-template-columns: repeat(3, 1fr); 
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card">
            <h3>Card 1</h3>
            <p>Ini adalah konten untuk kartu pertama. Di desktop ini akan berjejer di sebelah kiri.</p>
        </div>
        <div class="card">
            <h3>Card 2</h3>
            <p>Ini adalah konten untuk kartu kedua. Posisinya berada di tengah saat tampilan desktop.</p>
        </div>
        <div class="card">
            <h3>Card 3</h3>
            <p>Ini adalah konten untuk kartu ketiga. Di layar HP, kartu ini akan berada paling bawah.</p>
        </div>
    </div>

</body>
</html>
