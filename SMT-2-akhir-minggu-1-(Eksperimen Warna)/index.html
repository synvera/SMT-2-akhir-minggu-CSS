<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivitas 1 — Eksperimen Warna Pelangi</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #222222; /* Background gelap biar warna pelangi lebih menyala */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .box {
            width: 130px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 1. Merah */
        .merah {
            background-color: #FF0000;
            color: #FFFFFF; /* Teks putih agar kontras */
        }

        /* 2. Jingga / Oranye */
        .jingga {
            background-color: #FF7F00;
            color: #000000; /* Teks hitam agar lebih jelas */
        }

        /* 3. Kuning */
        .kuning {
            background-color: #FFFF00;
            color: #000000; /* Teks hitam karena kuning sangat terang */
        }

        /* 4. Hijau */
        .hijau {
            background-color: #00FF00;
            color: #000000; /* Teks hitam agar kontras */
        }

        /* 5. Biru */
        .biru {
            background-color: #0000FF;
            color: #FFFFFF; /* Teks putih karena biru tua */
        }

        /* 6. Nila / Indigo */
        .nila {
            background-color: #4B0082;
            color: #FFFFFF; /* Teks putih karena warna gelap */
        }

        /* 7. Ungu / Violet */
        .ungu {
            background-color: #9400D3;
            color: #FFFFFF; /* Teks putih agar kontras */
        }
    </style>
</head>
<body>

    <h1>Tugas Aktivitas 1 — Eksperimen Warna Pelangi</h1>

    <div class="container">

        <div class="box merah">
            <p>MERAH</p>
            <span style="font-size: 0.8rem;">Teks: Putih</span>
        </div>

        <div class="box jingga">
            <p>JINGGA</p>
            <span style="font-size: 0.8rem;">Teks: Hitam</span>
        </div>

        <div class="box kuning">
            <p>KUNING</p>
            <span style="font-size: 0.8rem;">Teks: Hitam</span>
        </div>

        <div class="box hijau">
            <p>HIJAU</p>
            <span style="font-size: 0.8rem;">Teks: Hitam</span>
        </div>

        <div class="box biru">
            <p>BIRU</p>
            <span style="font-size: 0.8rem;">Teks: Putih</span>
        </div>

        <div class="box nila">
            <p>NILA</p>
            <span style="font-size: 0.8rem;">Teks: Putih</span>
        </div>

        <div class="box ungu">
            <p>UNGU</p>
            <span style="font-size: 0.8rem;">Teks: Putih</span>
        </div>

    </div>

</body>
</html>
