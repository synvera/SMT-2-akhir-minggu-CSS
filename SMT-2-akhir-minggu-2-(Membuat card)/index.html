<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Profile</title>
    <style>
        /* Letakkan card di tengah halaman */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Tampilan utama kartu profil */
        .container {
            width: 280px;
            padding: 24px;
            margin: 20px;
            border: 2px solid #000000;
            border-radius: 8px;
            background-color: #ffffff;
            text-align: center;
        }

        /* Foto profil */
        .container img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* Nama dan jabatan */
        .keterangan h1 {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin: 0 0 8px 0;
        }

        .keterangan p {
            font-size: 13px;
            font-weight: 500;
            color: #555555;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Desain tanpa judul (2).png" alt="Profile Picture">
    <div class="keterangan">
        <h1>Mochammad Khahfi</h1>
        <p>Web Developer</p>
    </div>
</div>

</body>
</html>
