<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik 3 — Tombol Modern</title>
    <style>
        /* Gaya dasar */
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: navy;
            margin-bottom: 30px;
        }

        /* Tombol hijau */
        button {
            background-color: green;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: block; /* tombol di tengah */
            margin: 0 auto 30px auto;
            transition: background-color 0.3s ease;
        }

        /* Hover tombol */
        button:hover {
            background-color: darkgreen;
        }

        /* Gambar melengkung */
        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <h1>CONTOH WEBSITE MODERN SEDERHANA</h1>

    <!-- Komponen 1 & 2: Tombol Berwarna dengan Hover Effect -->
    <button>Klik Di Sini</button>
    
    <!-- Komponen 3: Gambar dengan Border Radius -->
    <img src="https://picsum.photos/300/200" alt="Sampel Gambar Modern">

</body>
</html>
